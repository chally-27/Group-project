<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d7a4f">
  <title>DawaSalama - Nje ya Mtandao</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #fafdf8;
      color: #1a4a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #2d7a4f; }
    p { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: #2d7a4f;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1a4a2e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>DawaSalama</h1>
    <p>Huna mtandao kwa sasa. Tafadhali angalia muunganisho wako wa internet na ujaribu tena.</p>
    <p>You are currently offline. Please check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Jaribu Tena / Retry</button>
  </div>
</body>
</html>
